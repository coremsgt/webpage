<!-- @template name="Marketing Site" description="Dark premium brand/marketing site — hero, services, values, process, CTA, contact modal" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Core Modern Solutions — Crecé con estrategia</title>
<link rel="stylesheet" href="_ds/core-modern-solutions-design-system-3e7ab268-7444-4410-84b8-5ae1abbaa024/styles.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-sans);background:var(--canvas-dark);color:#fff}
  .mk-root{background:var(--canvas-dark);overflow-x:hidden}
  a{text-decoration:none}
  .mk-eyebrow{font-size:11px;font-weight:var(--fw-bold);letter-spacing:var(--ls-label);text-transform:uppercase}
  .mk-eyebrow--blue{color:var(--blue-bright);display:inline-flex;align-items:center;gap:12px}
  .mk-eyebrow--blue::before{content:'';width:24px;height:1px;background:var(--blue-bright);opacity:.6}
  .mk-divider{border:none;border-top:1px solid var(--border-subtle);margin:0 48px}

  /* NAV */
  .mk-nav{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;
    padding:16px 48px;background:rgba(3,16,43,.85);backdrop-filter:blur(20px) saturate(1.4);
    border-bottom:1px solid rgba(0,73,229,.15)}
  .mk-nav__brand{display:flex;align-items:center;gap:13px}
  .mk-nav__mark{height:30px;width:auto}
  .mk-nav__name{font-size:12px;font-weight:var(--fw-semibold);letter-spacing:.16em;text-transform:uppercase;color:var(--n-300)}
  .mk-nav__links{display:flex;gap:32px;list-style:none}
  .mk-nav__links a{font-size:12px;font-weight:var(--fw-semibold);letter-spacing:.08em;text-transform:uppercase;color:var(--n-300);transition:color .2s}
  .mk-nav__links a:hover{color:#fff}

  /* HERO */
  .mk-hero{position:relative;min-height:88vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:80px 24px;
    background:radial-gradient(ellipse 90% 55% at 50% 0%,rgba(0,73,229,.16) 0%,transparent 70%),
               radial-gradient(ellipse 60% 40% at 18% 90%,rgba(50,130,0,.07) 0%,transparent 60%),var(--canvas-dark)}
  .mk-hero__inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;max-width:760px}
  .mk-hero__mark{width:clamp(120px,14vw,168px);margin:34px 0 36px;filter:drop-shadow(0 0 60px rgba(0,73,229,.3)) drop-shadow(0 0 120px rgba(0,73,229,.1))}
  .mk-hero__title{font-size:clamp(34px,5vw,60px);font-weight:var(--fw-light);line-height:1.08;letter-spacing:var(--ls-display)}
  .mk-hero__title strong{font-weight:var(--fw-bold)}
  .mk-hero__desc{font-size:clamp(15px,1.7vw,19px);color:var(--n-300);max-width:560px;line-height:1.7;margin:26px 0 36px}
  .mk-hero__cta{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-bottom:34px}
  .mk-hero__tags{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}

  /* SECTION */
  .mk-section{max-width:var(--container-max);margin:0 auto;padding:104px 48px}
  .mk-shead{margin-bottom:60px;max-width:640px}
  .mk-stitle{font-size:clamp(30px,3.6vw,50px);font-weight:var(--fw-light);line-height:1.12;letter-spacing:var(--ls-display);margin:18px 0 18px}
  .mk-stitle strong{font-weight:var(--fw-bold)}
  .mk-sdesc{font-size:16px;color:var(--n-300);line-height:1.75;max-width:560px}

  /* SERVICES */
  .mk-svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .mk-svc{border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:30px 28px;background:rgba(255,255,255,.02);
    transition:border-color .3s,background .3s,transform .3s}
  .mk-svc:hover{border-color:rgba(0,73,229,.3);background:rgba(0,73,229,.04);transform:translateY(-3px)}
  .mk-svc__icon{width:44px;height:44px;border-radius:11px;background:rgba(0,73,229,.12);color:var(--blue-bright);display:flex;align-items:center;justify-content:center;margin-bottom:20px}
  .mk-svc__icon svg{width:22px;height:22px}
  .mk-svc__num{font-size:10px;font-weight:var(--fw-bold);letter-spacing:.22em;color:var(--n-500);margin-bottom:8px}
  .mk-svc__name{font-size:21px;font-weight:var(--fw-bold);line-height:1.2;margin-bottom:12px}
  .mk-svc__body{font-size:14px;color:var(--n-300);line-height:1.65;margin:14px 0 16px}
  .mk-svc__list{list-style:none;display:flex;flex-direction:column;gap:9px}
  .mk-svc__list li{font-size:13.5px;color:var(--n-300);display:flex;gap:9px;align-items:flex-start}
  .mk-svc__check{width:15px;height:15px;color:var(--green-bright);flex-shrink:0;margin-top:2px}

  /* VALUES */
  .mk-val-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:48px}
  .mk-val{border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:28px 26px;background:rgba(255,255,255,.02)}
  .mk-val__bar{width:28px;height:3px;border-radius:3px;margin-bottom:20px}
  .mk-val__num{font-size:10px;font-weight:var(--fw-bold);letter-spacing:.22em;color:var(--n-500);margin-bottom:10px}
  .mk-val__name{font-size:22px;font-weight:var(--fw-bold);margin-bottom:12px}
  .mk-val__body{font-size:14px;color:var(--n-300);line-height:1.7}
  .mk-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}

  /* PROCESS */
  .mk-steps{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
  .mk-step{border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:24px 20px;background:rgba(255,255,255,.02)}
  .mk-step__idx{font-family:var(--font-mono);font-size:13px;color:var(--blue-bright);margin-bottom:14px}
  .mk-step__t{font-size:15px;font-weight:var(--fw-bold);margin-bottom:6px}
  .mk-step__d{font-size:13px;color:var(--n-500);line-height:1.5}

  /* CTA */
  .mk-cta{padding:40px 48px 110px}
  .mk-cta__inner{max-width:var(--container-max);margin:0 auto;border-radius:var(--radius-xl);padding:72px 56px;text-align:center;
    background:var(--grad-blue);border:1px solid rgba(0,73,229,.25);position:relative;overflow:hidden}
  .mk-cta__title{font-size:clamp(28px,3.4vw,44px);font-weight:var(--fw-light);line-height:1.15;letter-spacing:var(--ls-display);margin-bottom:16px}
  .mk-cta__title{font-weight:var(--fw-bold)}
  .mk-cta__desc{font-size:17px;color:var(--n-300);margin-bottom:32px}

  /* FOOTER */
  .mk-footer{background:var(--blue-dark);border-top:1px solid rgba(0,73,229,.2);padding:64px 48px;display:flex;justify-content:space-between;align-items:flex-end;gap:32px;flex-wrap:wrap}
  .mk-footer__mark{height:34px;display:block;margin-bottom:20px}
  .mk-footer__word{height:20px;opacity:.55;display:block}
  .mk-footer__tag{font-size:14px;color:var(--n-500);margin-top:16px}
  .mk-footer__right{text-align:right}
  .mk-footer__email{font-size:14px;color:var(--n-300);font-weight:var(--fw-medium)}
  .mk-footer__meta{font-size:12px;color:var(--n-500);margin-top:6px;font-family:var(--font-mono)}

  /* MODAL */
  .mk-modal{position:fixed;inset:0;z-index:100;background:rgba(3,16,43,.7);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:24px}
  .mk-modal__card{background:#fff;color:var(--n-900);border-radius:var(--radius-xl);padding:36px 36px 32px;max-width:540px;width:100%;position:relative;box-shadow:var(--shadow-lg)}
  .mk-modal__x{position:absolute;top:18px;right:20px;background:none;border:none;font-size:18px;color:var(--n-500);cursor:pointer}
  .mk-modal__title{font-size:26px;font-weight:var(--fw-bold);margin-bottom:6px;color:var(--n-900)}
  .mk-modal__sub{font-size:14px;color:var(--n-500);margin-bottom:22px}
  .mk-form{display:grid;grid-template-columns:1fr 1fr;gap:14px}

  @media(max-width:1000px){
    .mk-nav__links{display:none}
    .mk-svc-grid,.mk-val-grid,.mk-stats{grid-template-columns:1fr 1fr}
    .mk-steps{grid-template-columns:1fr 1fr 1fr}
    .mk-section{padding:72px 24px}
    .mk-divider{margin:0 24px}
    .mk-form{grid-template-columns:1fr}
  }
  @media(max-width:600px){
    .mk-svc-grid,.mk-val-grid,.mk-stats,.mk-steps{grid-template-columns:1fr}
    .mk-nav{padding:14px 20px}
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="_ds/core-modern-solutions-design-system-3e7ab268-7444-4410-84b8-5ae1abbaa024/_ds_bundle.js"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
